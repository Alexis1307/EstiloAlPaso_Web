jwt:
  secret: ${JWT_SECRET}

spring:
  application:
    name: estiloAlPaso

  datasource:
    url: jdbc:mysql://localhost:3306/estiloalpaso
    username: root
    password: mysql
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  logging:
    level:
      org.hibernate.SQL: DEBUG
      org.hibernate.type.descriptor.sql.BasicBinder: TRACE